# Виртуальный хост Apache для приложения Linker
# Скопируйте в C:\xampp\apache\conf\extra\httpd-vhosts.conf
# или подключите через Include в httpd.conf

<VirtualHost *:80>
    ServerName linker.local
    DocumentRoot "C:/xampp/htdocs/linker/public"

    <Directory "C:/xampp/htdocs/linker/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/linker-error.log"
    CustomLog "logs/linker-access.log" common
</VirtualHost>

